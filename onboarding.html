<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/png" href="/favicon-96x96.png?v=20260702" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=20260702" />
    <link rel="shortcut icon" href="/favicon.ico?v=20260702" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=20260702" />
    <meta name="apple-mobile-web-app-title" content="C-O" />
    <link rel="manifest" href="/site.webmanifest?v=20260702" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onboarding | Commit Overflow</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web" defer></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .onboarding-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 4rem 1rem;
            text-align: center;
        }
        .tech-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 1rem;
            margin: 3rem 0;
        }
        .tech-card {
            background-color: var(--bg-secondary);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }
        .tech-card:hover {
            border-color: var(--text-secondary);
        }
        .tech-card.selected {
            border-color: var(--accent-primary);
            background-color: rgba(35, 134, 54, 0.1);
            color: white;
        }
        .tech-card i {
            font-size: 2.5rem;
        }
    </style>
</head>
<body>
<script>if(localStorage.getItem('sidebar-collapsed')==='true') document.body.classList.add('sidebar-collapsed');</script>

    <div class="onboarding-container">
        <h1>What are your interests?</h1>
        <p class="text-secondary mt-1">Select the technologies you want to contribute to. We'll use this to recommend repositories.</p>
        
        <div class="tech-grid" id="tech-grid">
            <div class="loading-container">
                <i class="ph ph-spinner-gap loading-spinner text-primary" style="font-size: 2rem;"></i>
                <p class="text-secondary mt-2">Loading interests...</p>
            </div>
        </div>

        <a href="community.html" class="btn btn-primary" id="continue-btn" style="padding: 0.75rem 2rem; font-size: 1rem; display: inline-block;">
            Continue to Community <i class="ph ph-arrow-right"></i>
        </a>
    </div>

    <script src="js/api.js"></script>
    <script src="js/components.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (!API.isAuthenticated()) {
                window.location.href = 'login.html';
                return;
            }

            const currentUser = API.getCurrentUser();
            if (!currentUser) {
                window.location.href = 'login.html';
                return;
            }

            // Load technologies dynamically
            const renderTechs = async () => {
                try {
                    const techs = await API.fetchTechnologies();
                    const grid = document.getElementById('tech-grid');
                    if (grid) {
                        grid.innerHTML = '';
                        techs.forEach(t => {
                            let icon = 'ph-hexagon';
                            if (t.name === 'javascript') icon = 'ph-file-js';
                            else if (t.name === 'react') icon = 'ph-atom';
                            else if (t.name === 'python') icon = 'ph-file-py';
                            else if (t.name === 'go') icon = 'ph-google-logo';
                            else if (t.name === 'rust') icon = 'ph-gear';
                            else if (t.name === 'typescript') icon = 'ph-file-ts';
                            else if (t.name === 'java') icon = 'ph-coffee';
                            else if (t.name === 'flutter') icon = 'ph-device-mobile';
                            else if (t.name === 'cpp') icon = 'ph-file-c';

                            const div = document.createElement('div');
                            div.className = 'tech-card';
                            div.setAttribute('data-tech', t.name);
                            div.innerHTML = `<i class="ph ${icon}"></i> ${t.display_name}`;
                            div.addEventListener('click', () => {
                                div.classList.toggle('selected');
                            });
                            grid.appendChild(div);
                        });
                    }
                } catch(e) {
                    console.error("Failed to load technologies", e);
                }
            };
            
            await renderTechs();

            // Save interests on continue
            const continueBtn = document.getElementById('continue-btn');
            if (continueBtn) {
                continueBtn.addEventListener('click', async (e) => {
                    e.preventDefault();
                    
                    const selectedCards = document.querySelectorAll('.tech-card.selected');
                    const interests = Array.from(selectedCards).map(card => card.getAttribute('data-tech')).join(',');
                    
                    try {
                        continueBtn.style.pointerEvents = 'none';
                        continueBtn.textContent = 'Saving...';
                        
                        await API.updateProfile(currentUser.name, currentUser.college || '', interests);
                        window.location.href = 'community.html';
                    } catch (err) {
                        console.error("Failed to save interests:", err);
                        window.location.href = 'community.html';
                    }
                });
            }
        });
    </script>
</body>
</html>
