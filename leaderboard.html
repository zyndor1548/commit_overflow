<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard | Commit Overflow</title>
    <meta name="description" content="View the top contributors in the Commit Overflow challenge. See who is leading the pack in open source contributions.">
    <link rel="canonical" href="https://commitoverflow.com/leaderboard.html" />
    <link rel="icon" type="image/png" href="/favicon-96x96.png?v=20260702" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=20260702" />
    <link rel="shortcut icon" href="/favicon.ico?v=20260702" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=20260702" />
    <meta name="apple-mobile-web-app-title" content="C-O" />
    <link rel="manifest" href="/site.webmanifest?v=20260702" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://commitoverflow.com/leaderboard.html" />
    <meta property="og:title" content="Leaderboard | Commit Overflow" />
    <meta property="og:description" content="View the top contributors in the Commit Overflow challenge. See who is leading the pack in open source contributions." />
    <meta property="og:image" content="https://commitoverflow.com/logo/logo-dark-clr.svg" />
    <meta property="twitter:card" content="summary_large_image" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web" defer></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .podium-container {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 1rem;
            margin: 3rem 0;
        }
        .podium-place {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 135px;
        }
        .podium-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background-color: var(--bg-tertiary);
            border: 3px solid var(--border-color);
            margin-bottom: -32px;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: var(--text-secondary);
        }
        .podium-bar {
            width: 100%;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
            padding-left: 0.5rem;
            padding-right: 0.5rem;
            color: white;
            font-weight: bold;
            box-sizing: border-box;
            text-align: center;
        }
        .podium-bar > div {
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            box-sizing: border-box;
        }
        .podium-bar.first { height: 220px; border-color: #d29922; background: linear-gradient(180deg, rgba(210,153,34,0.2) 0%, var(--bg-secondary) 100%); }
        .podium-bar.second { height: 180px; border-color: #8b949e; background: linear-gradient(180deg, rgba(139,148,158,0.2) 0%, var(--bg-secondary) 100%); }
        .podium-bar.third { height: 140px; border-color: #a371f7; background: linear-gradient(180deg, rgba(163,113,247,0.2) 0%, var(--bg-secondary) 100%); }
        
        @media (max-width: 768px) {
            .podium-container {
                gap: 0.25rem;
                margin: 1rem 0;
                padding: 0;
                width: 100%;
                box-sizing: border-box;
            }
            .podium-place {
                flex: 1 1 0;
                width: auto;
                min-width: 0;
            }
            .podium-avatar {
                width: 40px !important;
                height: 40px !important;
                margin-bottom: -20px !important;
                font-size: 1rem;
                border-width: 2px;
            }
            .podium-place:nth-child(2) .podium-avatar {
                width: 50px !important;
                height: 50px !important;
                margin-bottom: -25px !important;
                border-width: 2px;
            }
            .podium-bar.first { height: 130px; }
            .podium-bar.second { height: 110px; }
            .podium-bar.third { height: 90px; }
            .podium-bar {
                padding-top: 25px;
                font-size: 0.7rem;
                padding-left: 0.25rem;
                padding-right: 0.25rem;
            }
            .podium-bar .text-sm {
                font-size: 0.65rem !important;
            }
            .podium-bar strong {
                font-size: 0.8rem;
                display: block;
                overflow: hidden;
                text-overflow: ellipsis;
                max-width: 100%;
            }
        }
        
        .controls-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .search-wrapper {
            flex-grow: 1;
            max-width: 400px;
            position: relative;
        }
        @media (max-width: 576px) {
            .controls-bar {
                flex-direction: column;
                align-items: stretch;
            }
            .search-wrapper {
                max-width: 100%;
            }
            .controls-bar > .flex {
                width: 100%;
                flex-direction: column;
            }
            .controls-bar select {
                width: 100% !important;
            }
        }
        .search-wrapper i {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }
        .search-wrapper input {
            padding-left: 2rem;
        }
    </style>
</head>
<body>
<script>if(localStorage.getItem('sidebar-collapsed')==='true') document.body.classList.add('sidebar-collapsed');</script>
    
    <div class="app-wrapper">
        <!-- Sidebar injected here -->
        
        <main class="main-content">
            <div class="page-header">
                <h1>Leaderboard</h1>
                <p class="text-secondary mt-1">See how you stack up against other developers.</p>
            </div>

            <div class="podium-container" id="podium-container">
                <div class="loading-container w-full">
                    <i class="ph ph-spinner-gap loading-spinner text-primary" style="font-size: 2rem;"></i>
                    <p class="text-secondary mt-2">Loading podium places...</p>
                </div>
            </div>

            <div class="card glass-card">
                <div class="controls-bar">
                    <div class="search-wrapper">
                        <i class="ph ph-magnifying-glass"></i>
                        <input type="text" class="form-control" id="search-input" placeholder="Search user...">
                    </div>
                    <div class="flex gap-2">
                        <select id="sort-select" class="form-control" style="width: auto;">
                            <option value="highest">Sort: Score (Highest)</option>
                            <option value="lowest">Sort: Score (Lowest)</option>
                        </select>
                        <select id="college-select" class="form-control" style="width: auto;">
                            <option value="all">Filter: All Colleges</option>
                        </select>
                    </div>
                </div>

                <div class="desktop-leaderboard">
                    <div class="table-responsive">
                        <table>
                            <thead>
                                <tr>
                                    <th>Rank</th>
                                    <th>User</th>
                                    <th>College</th>
                                    <th>Score</th>
                                </tr>
                            </thead>
                            <tbody id="leaderboard-body">
                                <tr>
                                    <td colspan="4">
                                        <div class="loading-container">
                                            <i class="ph ph-spinner-gap loading-spinner text-primary" style="font-size: 2rem;"></i>
                                            <p class="text-secondary mt-2">Loading leaderboard...</p>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div id="mobile-leaderboard-container" class="mobile-leaderboard-container">
                    <div class="loading-container">
                        <i class="ph ph-spinner-gap loading-spinner text-primary" style="font-size: 2rem;"></i>
                        <p class="text-secondary mt-2">Loading leaderboard...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/components.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            Components.renderSidebar('leaderboard');
            
            try {
                const leaderboard = await API.fetchLeaderboard('all');
                
                // 1. Populate the top 3 podium places
                const podiumContainer = document.getElementById('podium-container');
                if (podiumContainer) {
                    const first = leaderboard[0];
                    const second = leaderboard[1];
                    const third = leaderboard[2];
                    
                    podiumContainer.innerHTML = `
                        <!-- Second Place -->
                        <div class="podium-place">
                            <div class="podium-avatar" style="border-color: #8b949e; overflow: hidden;">
                                ${second && second.avatar_url ? `<img src="${second.avatar_url}" style="width:100%;height:100%;object-fit:cover;" />` : '<i class="ph ph-user"></i>'}
                            </div>
                            <div class="podium-bar second">
                                <div>2</div>
                                <div class="text-sm font-normal text-secondary mt-1">${second ? second.github_username : '---'}</div>
                                <div class="text-primary text-sm mt-1">${second ? second.total_points : 0} pts</div>
                            </div>
                        </div>
                        <!-- First Place -->
                        <div class="podium-place">
                            <div class="podium-avatar" style="border-color: #d29922; width: 80px; height: 80px; margin-bottom: -40px; overflow: hidden;">
                                ${first && first.avatar_url ? `<img src="${first.avatar_url}" style="width:100%;height:100%;object-fit:cover;" />` : '<i class="ph ph-crown" style="color: #d29922;"></i>'}
                            </div>
                            <div class="podium-bar first">
                                <div style="font-size: 1.5rem;">1</div>
                                <div class="text-sm font-normal text-secondary mt-1">${first ? first.github_username : '---'}</div>
                                <div class="text-primary text-sm mt-1">${first ? first.total_points : 0} pts</div>
                            </div>
                        </div>
                        <!-- Third Place -->
                        <div class="podium-place">
                            <div class="podium-avatar" style="border-color: #a371f7; overflow: hidden;">
                                ${third && third.avatar_url ? `<img src="${third.avatar_url}" style="width:100%;height:100%;object-fit:cover;" />` : '<i class="ph ph-user"></i>'}
                            </div>
                            <div class="podium-bar third">
                                <div>3</div>
                                <div class="text-sm font-normal text-secondary mt-1">${third ? third.github_username : '---'}</div>
                                <div class="text-primary text-sm mt-1">${third ? third.total_points : 0} pts</div>
                            </div>
                        </div>
                    `;
                }

                // 2. Populate college filter dropdown
                const collegeSelect = document.getElementById('college-select');
                if (collegeSelect) {
                    const colleges = [...new Set(leaderboard.map(e => e.college).filter(Boolean))];
                    colleges.forEach(col => {
                        const opt = document.createElement('option');
                        opt.value = col.toLowerCase();
                        opt.textContent = col;
                        collegeSelect.appendChild(opt);
                    });
                }
                
                // 3. Render leaderboard body rows
                const tbody = document.getElementById('leaderboard-body');
                const mobileContainer = document.getElementById('mobile-leaderboard-container');
                
                const renderTable = (data) => {
                    if (tbody) tbody.innerHTML = '';
                    if (mobileContainer) mobileContainer.innerHTML = '';
                    
                    if (data.length === 0) {
                        if (tbody) tbody.innerHTML = `<tr><td colspan="4" class="text-center text-secondary py-3">No participants found.</td></tr>`;
                        if (mobileContainer) mobileContainer.innerHTML = `<div class="text-center text-secondary py-3">No participants found.</div>`;
                        return;
                    }
                    
                    data.forEach(entry => {
                        // Desktop Table Rendering
                        let rankEmoji = entry.rank;
                        if (entry.rank === 1) rankEmoji = '🥇 1';
                        else if (entry.rank === 2) rankEmoji = '🥈 2';
                        else if (entry.rank === 3) rankEmoji = '🥉 3';
                        
                        if (tbody) {
                            const tr = document.createElement('tr');
                            tr.dataset.college = (entry.college || '').toLowerCase();
                            tr.innerHTML = `
                                <td><strong>${rankEmoji}</strong></td>
                                <td class="flex items-center gap-2">
                                    <div style="width:24px;height:24px;background:var(--bg-tertiary);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;overflow:hidden;">
                                        ${entry.avatar_url ? `<img src="${entry.avatar_url}" style="width:100%;height:100%;object-fit:cover;" />` : '<i class="ph ph-user"></i>'}
                                    </div>
                                    ${entry.github_username}
                                </td>
                                <td>${entry.college || '---'}</td>
                                <td class="text-primary font-bold">${entry.total_points}</td>
                            `;
                            tbody.appendChild(tr);
                        }

                        // Mobile Card Rendering
                        if (mobileContainer) {
                            const isTop3 = entry.rank <= 3;
                            let mobileRankIcon = `<span class="text-secondary font-bold">#${entry.rank}</span>`;
                            if (entry.rank === 1) mobileRankIcon = `<i class="ph ph-crown" style="color: gold; font-size: 1.5rem;"></i>`;
                            else if (entry.rank === 2) mobileRankIcon = `<i class="ph ph-crown" style="color: silver; font-size: 1.5rem;"></i>`;
                            else if (entry.rank === 3) mobileRankIcon = `<i class="ph ph-crown" style="color: #cd7f32; font-size: 1.5rem;"></i>`;
                            
                            const card = document.createElement('div');
                            card.className = `mobile-lb-card ${entry.rank === 1 ? 'rank-1' : ''}`;
                            card.innerHTML = `
                                <div class="mobile-lb-username">${(entry.github_username || entry.name || 'UNKNOWN').toUpperCase()}</div>
                                <div class="mobile-lb-content">
                                    <div class="mobile-lb-rank">${mobileRankIcon}</div>
                                    <div class="mobile-lb-avatar">
                                        ${entry.avatar_url ? `<img src="${entry.avatar_url}" alt="avatar">` : `<i class="ph ph-user"></i>`}
                                    </div>
                                    <div class="mobile-lb-stats">
                                        <div class="stat text-blue"><i class="ph ph-git-merge"></i> ${entry.prs || 0} PRs</div>
                                        <div class="stat text-red"><i class="ph ph-warning-circle"></i> ${entry.issues || 0} Issues</div>
                                        <div class="stat text-purple"><i class="ph ph-stack"></i> ${entry.repos || 0} Repos</div>
                                    </div>
                                    <div class="mobile-lb-scorebox">
                                        <div class="score-val">${entry.total_points}</div>
                                        <div class="score-lbl">STACK SCORE</div>
                                    </div>
                                </div>
                            `;
                            mobileContainer.appendChild(card);
                        }
                    });
                };
                
                renderTable(leaderboard);
                
                // Setup search, sort, and college filter controls
                const searchInput = document.getElementById('search-input');
                const sortSelect = document.getElementById('sort-select');
                
                const filterAndSort = () => {
                    const query = searchInput.value.toLowerCase();
                    const sortVal = sortSelect.value;
                    const collegeVal = collegeSelect.value;
                    
                    let filtered = leaderboard.filter(entry => {
                        const nameMatch = entry.github_username.toLowerCase().includes(query) || 
                                          entry.name.toLowerCase().includes(query);
                        const collegeMatch = collegeVal === 'all' || 
                                            (entry.college || '').toLowerCase() === collegeVal;
                        return nameMatch && collegeMatch;
                    });
                    
                    filtered.sort((a, b) => {
                        if (sortVal === 'highest') {
                            return b.total_points - a.total_points;
                        } else if (sortVal === 'lowest') {
                            return a.total_points - b.total_points;
                        }
                        return 0;
                    });
                    
                    renderTable(filtered);
                };
                
                searchInput.addEventListener('input', filterAndSort);
                sortSelect.addEventListener('change', filterAndSort);
                collegeSelect.addEventListener('change', filterAndSort);

            } catch (err) {
                console.error("Error fetching leaderboard", err);
                Components.showToast("Failed to load leaderboard data.", "error");
            }
        });
    </script>
</body>
</html>
