<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us | Commit Overflow</title>
    <meta name="description" content="Learn more about Commit Overflow, the ultimate month-long open source competition by FOSS CEAL.">
    <link rel="canonical" href="https://commitoverflow.com/about.html" />
    <link rel="icon" type="image/png" href="/favicon-96x96.png?v=20260702" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=20260702" />
    <link rel="shortcut icon" href="/favicon.ico?v=20260702" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=20260702" />
    <meta name="apple-mobile-web-app-title" content="C-O" />
    <link rel="manifest" href="/site.webmanifest?v=20260702" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://commitoverflow.com/about.html" />
    <meta property="og:title" content="About Us | Commit Overflow" />
    <meta property="og:description" content="Learn more about Commit Overflow, the ultimate month-long open source competition by FOSS CEAL." />
    <meta property="og:image" content="https://commitoverflow.com/logo/logo-dark-clr.svg" />
    <meta property="twitter:card" content="summary_large_image" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web" defer></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .public-wrapper {
            max-width: 800px;
            margin: 4rem auto;
            padding: 0 1.5rem;
            width: 100%;
        }
        .public-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }
        .public-logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }
        .public-logo:hover {
            color: white;
            text-decoration: none;
        }
        .public-logo img {
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform: rotateY(0deg);
        }
        .public-logo:hover img {
            transform: rotateY(360deg);
        }
        .public-logo i {
            color: var(--accent-primary);
            font-size: 1.75rem;
        }
        .nav-links {
            display: flex;
            gap: 1.5rem;
        }
        .about-content {
            font-size: 1.1rem;
            line-height: 1.75;
            color: var(--text-primary);
            white-space: pre-wrap;
            position: relative;
            z-index: 10;
        }
        .footer-credits {
            text-align: center;
            margin-top: 5rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
            position: relative;
            z-index: 10;
        }
    </style>
</head>
<body>
<script>if(localStorage.getItem('sidebar-collapsed')==='true') document.body.classList.add('sidebar-collapsed');</script>


    <canvas id="bg-ascii-canvas" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; pointer-events: none;"></canvas>

    <div class="public-wrapper" style="position: relative; z-index: 10;">
        <header class="public-nav">
            <a href="index.html" class="public-logo">
                <img src="logo/logo-light-clr.svg" alt="Logo" style="height: 36px; width: auto;">
                <span>Commit Overflow</span>
            </a>
        </header>

        <main class="card glass-card">
            <h1><i class="ph ph-info" style="color: var(--accent-primary); vertical-align: middle;"></i> About Us</h1>
            <div id="about-text-container" class="about-content">
                <div class="loading-container">
                    <i class="ph ph-spinner-gap loading-spinner text-primary" style="font-size: 2rem;"></i>
                    <p class="text-secondary mt-2">Loading About Us content...</p>
                </div>
            </div>
        </main>

        <footer class="footer-credits">
            <p>&copy; 2026 Commit Overflow Community. All rights reserved.</p>
        </footer>
    </div>

    <script src="js/api.js"></script>
    <script src="js/ascii-ripple.js"></script>
    <script>
        const defaultAboutHTML = `
        <div class="text-center" style="white-space: normal; max-width: 900px; margin: 0;">
            <div style="text-align: left; font-size: 1.05rem; line-height: 1.8; color: var(--text-secondary);">
            
                <p>
                    <strong>Commit Overflow</strong> is an online open-source contribution event
                    organized by the <strong>FOSS Club, College of Engineering Attingal (CEAL)</strong>.
                    The event is designed to introduce students to real-world collaborative software
                    development through GitHub while encouraging quality contributions to open-source projects.
                </p>
            
                <p>
                    Participants explore repositories, identify improvements, create issues,
                    implement solutions, and submit pull requests. Every contribution goes
                    through mentor review to ensure fairness, maintain code quality, and provide
                    valuable feedback throughout the event.
                </p>
            
                <h4 style="margin-top:2rem;">Our Goal</h4>
                <p>
                    Our objective is to bridge the gap between learning and real-world software
                    development by providing participants with practical experience in version
                    control, collaboration, code reviews, and the complete open-source workflow.
                </p>
            
                <h4 style="margin-top:2rem;">What Makes Commit Overflow Different?</h4>
            
                <ul style="margin-left:1.5rem;">
                    <li>Real GitHub-based open-source workflow</li>
                    <li>Participants identify and solve genuine project issues</li>
                    <li>Mentor-reviewed issues and pull requests</li>
                    <li>Live leaderboard with transparent scoring</li>
                    <li>Dedicated dashboard for tracking contributions</li>
                    <li>Recognition through awards, certificates, and the Commit Overflow Fellowship</li>
                </ul>
            
                <h4 style="margin-top:2rem;">Our Mentors</h4>
            
                <p>
                    Each repository is maintained by experienced mentors who review issues,
                    assign difficulty levels, provide guidance, review pull requests, and help
                    participants follow industry-standard development practices.
                </p>
            
                <h4 style="margin-top:2rem;">Acknowledgements</h4>
            
                <p>
                    Commit Overflow is inspired by community-driven open-source events such as
                    <strong>Hack the Stack</strong> conducted by <strong>FOSS LBSTW</strong>,
                    while introducing our own contribution workflow and event platform.
                </p>
            
                <p>
                    We sincerely thank every participant, mentor, maintainer, and volunteer who
                    contributes their time and effort to making this event a meaningful learning
                    experience.
                </p>
            
            </div>
        </div>
        `;

        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('about-text-container');
            container.innerHTML = defaultAboutHTML;
        });
    </script>
</body>
</html>
