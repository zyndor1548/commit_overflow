<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/png" href="/favicon-96x96.png?v=20260702" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=20260702" />
    <link rel="shortcut icon" href="/favicon.ico?v=20260702" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=20260702" />
    <meta name="apple-mobile-web-app-title" content="C-O" />
    <link rel="manifest" href="/site.webmanifest?v=20260702" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Commit Overflow</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web" defer></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .stat-card {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: white;
        }
        .stat-label {
            color: var(--text-secondary);
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .activity-feed {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .activity-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }
        .activity-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }
        .activity-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .activity-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--bg-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }
        .activity-icon.pr { color: #a371f7; }
        .activity-icon.issue { color: #3fb950; }
        .heatmap-container {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            overflow-x: auto;
        }
        .heatmap-grid {
            display: grid;
            grid-auto-flow: column;
            grid-template-rows: repeat(7, 10px);
            grid-auto-columns: 10px;
            gap: 3px;
            justify-content: start;
        }
        .heatmap-cell {
            width: 10px;
            height: 10px;
            border-radius: 2px;
            background-color: var(--bg-tertiary);
            transition: background-color 0.2s ease;
            cursor: pointer;
        }
        .heatmap-cell:hover {
            outline: 1px solid var(--text-primary);
        }
        .heatmap-cell.level-0 { background-color: var(--bg-tertiary); }
        .heatmap-cell.level-1 { background-color: #0e4429; }
        .heatmap-cell.level-2 { background-color: #006d32; }
        .heatmap-cell.level-3 { background-color: #26a641; }
        .heatmap-cell.level-4 { background-color: #39d353; }

        .heatmap-legend {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        .legend-box {
            width: 10px;
            height: 10px;
            border-radius: 2px;
        }
        .legend-box.level-0 { background-color: var(--bg-tertiary); }
        .legend-box.level-1 { background-color: #0e4429; }
        .legend-box.level-2 { background-color: #006d32; }
        .legend-box.level-3 { background-color: #26a641; }
        .legend-box.level-4 { background-color: #39d353; }
        
        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1rem;
        }
        @media (max-width: 992px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .tag-stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border-color);
        }
        .tag-stat-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }
        .tag-badge {
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: capitalize;
            color: white;
        }
    </style>
</head>
<body>
<script>if(localStorage.getItem('sidebar-collapsed')==='true') document.body.classList.add('sidebar-collapsed');</script>
    
    <div class="app-wrapper">
        <!-- Sidebar injected here -->
        
        <main class="main-content">
            <div class="page-header">
                <h1>Welcome Back, <span class="text-primary" id="hero-username"></span>!</h1>
                <p class="text-secondary mt-1">Here is your current progress in the competition.</p>
            </div>

            <!-- Stats Row -->
            <div class="grid grid-cols-4 md:grid-cols-2 sm:grid-cols-1 gap-3 mb-4">
                <div class="card stat-card">
                    <span class="stat-label">Current Points</span>
                    <span class="stat-value text-primary" id="stat-points">--</span>
                </div>
                <div class="card stat-card">
                    <span class="stat-label">Leaderboard Rank</span>
                    <span class="stat-value" id="stat-rank">--</span>
                </div>
                <div class="card stat-card">
                    <span class="stat-label">Repos Contributed</span>
                    <span class="stat-value" id="stat-repos">--</span>
                </div>
                <div class="card stat-card">
                    <span class="stat-label">Projected Score</span>
                    <span class="stat-value" style="color: #a371f7;" id="stat-projected">--</span>
                </div>
            </div>

            <div class="dashboard-grid">
                <!-- Left Column -->
                <div>
                    
                    <div class="card mb-4">
                        <h2 class="mb-3">Contribution Activity</h2>
                        <div class="heatmap-container mb-2">
                            <div class="heatmap-grid" id="heatmap-grid"></div>
                            <div class="heatmap-legend">
                                <span>Less</span>
                                <span class="legend-box level-0"></span>
                                <span class="legend-box level-1"></span>
                                <span class="legend-box level-2"></span>
                                <span class="legend-box level-3"></span>
                                <span class="legend-box level-4"></span>
                                <span>More</span>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <h2 class="mb-3">Recent Activity Feed</h2>
                        <div class="activity-feed" id="activity-feed-container">
                            <div class="loading-container">
                                <i class="ph ph-spinner-gap loading-spinner text-primary" style="font-size: 2rem;"></i>
                                <p class="text-secondary mt-2">Loading activity...</p>
                            </div>
                        </div>
                    </div>

                </div>

                <!-- Right Column -->
                <div>
                    <div class="card glass-card mb-4">
                        <h2 class="mb-2">Tag Statistics</h2>
                        <div id="tag-stats-container">
                            <div class="loading-container" style="padding: 1rem 0;">
                                <i class="ph ph-spinner-gap loading-spinner text-primary" style="font-size: 1.5rem;"></i>
                            </div>
                        </div>
                    </div>

                    <div class="card glass-card mb-4">
                        <h2 class="mb-2">Quick Actions</h2>
                        <div class="flex flex-col gap-2">
                            <a href="queries.html" class="btn btn-primary btn-block justify-between">
                                Raise a Query <i class="ph ph-arrow-right"></i>
                            </a>
                            <a href="leaderboard.html" class="btn btn-secondary btn-block justify-between">
                                View Leaderboard <i class="ph ph-arrow-right"></i>
                            </a>
                            <a href="rules.html" class="btn btn-secondary btn-block justify-between">
                                Read Rules <i class="ph ph-arrow-right"></i>
                            </a>
                        </div>
                    </div>

                </div>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/components.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (!API.isAuthenticated()) {
                window.location.href = 'login.html';
                return;
            }
            
            Components.renderSidebar('dashboard');
            
            const currentUser = API.getCurrentUser();
            if (!currentUser) {
                window.location.href = 'login.html';
                return;
            }
            
            // Set initial name based on currentUser
            const formattedName = currentUser.name.split(' ')[0];
            document.getElementById('hero-username').textContent = formattedName;
            
            try {
                // Fetch dashboard data
                const dashData = await API.fetchDashboardData(currentUser.id);
                const projectedData = await API.fetchProjectedScore(currentUser.id);
                
                // Update user details
                if (dashData.profile) {
                    const formatted = dashData.profile.name.split(' ')[0];
                    document.getElementById('hero-username').textContent = formatted;
                    document.getElementById('stat-points').textContent = dashData.profile.total_points;
                }
                
                // Update stats
                document.getElementById('stat-repos').textContent = dashData.stats.repositories ? dashData.stats.repositories.length : 0;
                document.getElementById('stat-projected').textContent = projectedData.projected_total || dashData.profile.total_points;
                
                // Fetch leaderboard to calculate rank
                try {
                    const leaderboard = await API.fetchLeaderboard('all');
                    const userRank = leaderboard.find(entry => entry.user_id === currentUser.id);
                    if (userRank) {
                        document.getElementById('stat-rank').textContent = `#${userRank.rank}`;
                    } else {
                        document.getElementById('stat-rank').textContent = 'N/A';
                    }
                } catch (e) {
                    console.error("Failed to load leaderboard rank", e);
                    document.getElementById('stat-rank').textContent = '--';
                }

                // Fetch Tag Stats
                try {
                    const tagStatsContainer = document.getElementById('tag-stats-container');
                    const tagStats = await API.fetchTagStats(currentUser.id);
                    
                    if (tagStatsContainer) {
                        tagStatsContainer.innerHTML = '';
                        if (!tagStats || Object.keys(tagStats).length === 0) {
                            tagStatsContainer.innerHTML = '<div class="text-secondary text-center py-3">No tag statistics available.</div>';
                        } else {
                            // Predefined palette for well-known labels; unknown labels get
                            // a deterministic muted color so new labels are never invisible.
                            const knownTagColors = {
                                'easy':          '#3fb950', // green
                                'medium':        '#d29922', // amber
                                'hard':          '#f85149', // red
                                'documentation': '#58a6ff', // blue
                                'docs':          '#58a6ff', // blue (alias)
                                'bug':           '#f85149', // red
                                'enhancement':   '#a371f7', // purple
                                'feature':       '#a371f7', // purple
                                'good first issue': '#3fb950', // green
                                'duplicate': '#8b949e', // gray
                            };

                            // Simple deterministic hash → hue for completely unknown labels
                            function labelToColor(label) {
                                if (knownTagColors[label.toLowerCase()]) {
                                    return knownTagColors[label.toLowerCase()];
                                }
                                let hash = 0;
                                for (let i = 0; i < label.length; i++) {
                                    hash = label.charCodeAt(i) + ((hash << 5) - hash);
                                }
                                const hue = Math.abs(hash) % 360;
                                return `hsl(${hue}, 55%, 55%)`;
                            }

                            // Sort entries so the display is stable across renders
                            const sorted = Object.entries(tagStats).sort((a, b) => b[1] - a[1]);
                            sorted.forEach(([tag, count]) => {
                                const color = labelToColor(tag);
                                const div = document.createElement('div');
                                div.className = 'tag-stat-item';
                                div.innerHTML = `
                                    <span class="text-secondary" style="text-transform: capitalize;">${tag.replace(/_/g, ' ')}</span>
                                    <span class="tag-badge" style="background-color: ${color}; font-size: 0.85rem; padding: 0.25rem 0.75rem; border-radius: 6px;">${count}</span>
                                `;
                                tagStatsContainer.appendChild(div);
                            });
                        }
                    }
                } catch (e) {
                    console.error("Failed to fetch tag stats", e);
                    const tagStatsContainer = document.getElementById('tag-stats-container');
                    if (tagStatsContainer) {
                        tagStatsContainer.innerHTML = '<div class="text-secondary text-center py-3">Failed to load tag statistics.</div>';
                    }
                }
                
                // Render Activity Feed
                const container = document.getElementById('activity-feed-container');
                if (container) {
                    container.innerHTML = '';
                    const timeline = dashData.activity_timeline || [];
                    if (timeline.length === 0) {
                        container.innerHTML = '<div class="text-secondary text-center py-3">No activity recorded yet.</div>';
                    } else {
                        timeline.forEach(item => {
                            const isPR = item.event_type.toLowerCase().includes('pr') || item.event_type.toLowerCase().includes('pull');
                            const iconClass = isPR ? 'ph-git-pull-request' : 'ph-warning-circle';
                            const iconColorClass = isPR ? 'pr' : 'issue';
                            
                            // Format date nicely
                            let dateStr = API.formatDateTime(item.created_at);
                            
                            // Format related GitHub link
                            let linkHtml = '';
                            if (item.repo_url) {
                                if (item.github_issue_id) {
                                    linkHtml = `<a href="${item.repo_url}/issues/${item.github_issue_id}" target="_blank" class="text-xs text-primary" style="display: inline-flex; align-items: center; gap: 0.25rem; margin-top: 0.25rem; color: var(--accent-secondary); text-decoration: none;"><i class="ph ph-arrow-square-out"></i> View Issue #${item.github_issue_id}</a>`;
                                } else if (item.github_pr_id) {
                                    linkHtml = `<a href="${item.repo_url}/pull/${item.github_pr_id}" target="_blank" class="text-xs text-primary" style="display: inline-flex; align-items: center; gap: 0.25rem; margin-top: 0.25rem; color: var(--accent-secondary); text-decoration: none;"><i class="ph ph-arrow-square-out"></i> View PR #${item.github_pr_id}</a>`;
                                } else {
                                    linkHtml = `<a href="${item.repo_url}" target="_blank" class="text-xs text-primary" style="display: inline-flex; align-items: center; gap: 0.25rem; margin-top: 0.25rem; color: var(--accent-secondary); text-decoration: none;"><i class="ph ph-arrow-square-out"></i> View Repository</a>`;
                                }
                            }

                            const div = document.createElement('div');
                            div.className = 'activity-item';
                            div.innerHTML = `
                                <div class="activity-info">
                                    <div class="activity-icon ${iconColorClass}">
                                        <i class="ph ${iconClass}"></i>
                                    </div>
                                    <div>
                                        <div class="font-medium">
                                            ${item.description}
                                        </div>
                                        <div class="text-secondary text-sm">${dateStr}</div>
                                        ${linkHtml}
                                    </div>
                                </div>
                            `;
                            container.appendChild(div);
                        });
                    }
                }

                // Render Contribution Heatmap
                const heatmapGrid = document.getElementById('heatmap-grid');
                if (heatmapGrid) {
                    heatmapGrid.innerHTML = '';
                    
                    const activityCounts = {};
                    const timeline = dashData.activity_timeline || [];
                    timeline.forEach(item => {
                        try {
                            const date = new Date(item.created_at);
                            const yyyymmdd = date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0') + '-' + String(date.getDate()).padStart(2, '0');
                            activityCounts[yyyymmdd] = (activityCounts[yyyymmdd] || 0) + 1;
                        } catch(e){}
                    });

                    // 24 weeks of 7 days
                    const totalDays = 24 * 7;
                    const now = new Date();
                    const todayDay = now.getDay();
                    
                    const startDate = new Date();
                    startDate.setDate(now.getDate() - (totalDays - 1 - todayDay));
                    
                    for (let i = 0; i < totalDays; i++) {
                        const currentDate = new Date(startDate);
                        currentDate.setDate(startDate.getDate() + i);
                        
                        const yyyymmdd = currentDate.getFullYear() + '-' + String(currentDate.getMonth() + 1).padStart(2, '0') + '-' + String(currentDate.getDate()).padStart(2, '0');
                        const count = activityCounts[yyyymmdd] || 0;
                        
                        let level = 0;
                        if (count === 1) level = 1;
                        else if (count === 2) level = 2;
                        else if (count === 3) level = 3;
                        else if (count > 3) level = 4;
                        
                        const cell = document.createElement('div');
                        cell.className = `heatmap-cell level-${level}`;
                        
                        const dateFormatted = currentDate.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
                        cell.title = `${count === 0 ? 'No' : count} contribution${count === 1 ? '' : 's'} on ${dateFormatted}`;
                        
                        heatmapGrid.appendChild(cell);
                    }
                }

                // Badges updates removed (not currently in use)
                
            } catch (err) {
                console.error("Error loading dashboard data", err);
                Components.showToast("Failed to load dashboard data.", "error");
            }
        });
    </script>
</body>
</html>
